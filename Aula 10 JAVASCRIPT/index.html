<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 10: Introdução ao JavaScript</title>
</head>
<body>
    <!-- O javascrips abre e fecha antes do fechamento do body-->
    <script>
        
        console.log("Olá, mundo!"); // Imprime a mensagem "Olá, mundo!" no console do navegador apertando o F12 dá pra ver
        let nome = "Amanda"; // Declara uma variável chamada "nome" e atribui o valor "João"
        let idade = 39; // Declara uma variável chamada "idade" e atribui o valor 30 - não usa aspas para números, apenas para texto
        
        console.log(nome); // Imprime o valor da variável "nome" no console do navegador
        console.log(idade); // Imprime o valor da variável "idade" no console do navegador
        console.log(`Meu nome é ${nome}, e eu tenho ${idade} anos de idade.`); // Imprime a mensagem usando crases, que permitem a interpolação de variáveis e expressões`)
    </script>
</body>
</html>
